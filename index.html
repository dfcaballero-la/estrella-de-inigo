<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="La Estrella de Iñigo — un cielo para recordar." />
    <meta name="theme-color" content="#050810" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="La Estrella de Iñigo" />
    <meta property="og:description" content="Un cielo estrellado en memoria de Iñigo. Su estrella brilla junto a la de su hermano Iñaki." />
    <meta property="og:url" content="https://dfcaballero-la.github.io/estrella-de-inigo/" />
    <meta property="og:image" content="https://dfcaballero-la.github.io/estrella-de-inigo/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap"
    />
    <title>La Estrella de Iñigo</title>
  </head>
  <body>
    <main id="sky-root" data-screen="El cielo de Iñigo">
      <canvas id="sky" aria-label="Cielo estrellado en memoria de Iñigo"></canvas>
      <button id="open-story" class="sr-only">Leer la historia de Iñigo</button>
      <div id="story" role="dialog" aria-modal="true" aria-label="La historia de Iñigo" tabindex="-1" hidden></div>
      <button id="audio" aria-pressed="false" aria-label="Sonido" title="Sonido">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <circle cx="6.5" cy="9" r="2.4" fill="none" stroke="#8FA8CC" stroke-width="1"></circle>
          <path id="arc1" d="M 10.5 6.2 A 4.2 4.2 0 0 1 10.5 11.8" fill="none" stroke="#8FA8CC" stroke-width="1"></path>
          <path id="arc2" d="M 12.6 4.4 A 6.8 6.8 0 0 1 12.6 13.6" fill="none" stroke="#8FA8CC" stroke-width="1"></path>
        </svg>
      </button>
      <div id="veil" aria-hidden="true"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
